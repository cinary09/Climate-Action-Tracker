{% extends "base.html" %}

{% block title %}Login - Climate Action Tracker{% endblock %}

{% block content %}
<div class="container">
    <div class="form-container">
        <h1>Sign In</h1>
        <p class="form-subtitle">Access your climate action dashboard</p>

        <form method="POST" class="form">
            <div class="form-group">
                <label for="username">Username</label>
                <input id="username" name="username" type="text" required
                       autocomplete="username" value="{{ username or '' }}">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input id="password" name="password" type="password" required
                       autocomplete="current-password">
            </div>

            <button class="btn btn-primary btn-full" type="submit">Sign In</button>
        </form>

        <p class="form-footer">Need an account? <a href="{{ url_for('register') }}">Create one here</a></p>
    </div>
</div>
{% endblock %}
