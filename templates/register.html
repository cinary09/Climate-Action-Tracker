{% extends "base.html" %}

{% block title %}Register - Climate Action Tracker{% endblock %}

{% block content %}
<div class="container">
    <div class="form-container">
        <h1>Create Your Account</h1>
        <p class="form-subtitle">Join our community and start tracking your climate actions.</p>

        <form method="POST" class="form">
            <div class="form-group">
                <label for="username">Username</label>
                <input id="username" name="username" type="text" minlength="3" required
                       autocomplete="username" value="{{ username or '' }}">
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input id="email" name="email" type="email" required
                       autocomplete="email" value="{{ email or '' }}">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input id="password" name="password" type="password" minlength="6" required
                       autocomplete="new-password">
                <small>Minimum 6 characters</small>
            </div>

            <div class="form-group">
                <label for="confirm_password">Confirm Password</label>
                <input id="confirm_password" name="confirm_password" type="password" minlength="6" required
                       autocomplete="new-password">
            </div>

            <button class="btn btn-primary btn-full" type="submit">Register</button>
        </form>

        <p class="form-footer">Already have an account? <a href="{{ url_for('login') }}">Sign in here</a></p>
    </div>
</div>
{% endblock %}
